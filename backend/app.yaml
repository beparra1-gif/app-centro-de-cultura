name: ccf-backend
services:
- github:
    branch: main
    repo: tu-usuario/app-centro-de-cultura
    build_command: npm install
    run_command: npm start
  http_port: 3000
  name: api
  source_dir: backend
  health_check:
    http_path: /api/health
  envs:
  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    value: ${db.DATABASE_URL}
  - key: NODE_ENV
    value: production
  - key: PORT
    value: "3000"
  - key: JWT_SECRET
    value: ""
  - key: FRONTEND_URL
    value: ""
  - key: TWILIO_ACCOUNT_SID
    value: ""
  - key: TWILIO_AUTH_TOKEN
    value: ""
  - key: TWILIO_PHONE_NUMBER
    value: ""
  - key: GOOGLE_SHEET_ID
    value: ""
  - key: GOOGLE_API_KEY
    value: ""
  - key: ADMIN_SYNC_TOKEN
    value: ""
  - key: BACKUP_ENABLED
    value: "true"
  - key: BACKUP_CRON
    value: "0 */6 * * *"
  - key: BACKUP_KEEP_DAYS
    value: "7"
  - key: BACKUP_RUN_ON_START
    value: "true"
  - key: BACKUP_ALLOW_JSON_FALLBACK
    value: "true"
  - key: BACKUP_MAX_AGE_HOURS
    value: "36"
  - key: BACKUP_DIR
    value: "backups"
  - key: BACKUP_MANIFEST_PATH
    value: "backups/backup-manifest.json"
  - key: BACKUP_UPLOAD_ENABLED
    value: "false"
  - key: BACKUP_UPLOAD_REQUIRED
    value: "false"
  - key: BACKUP_S3_ENDPOINT
    value: "https://nyc3.digitaloceanspaces.com"
  - key: BACKUP_S3_REGION
    value: "us-east-1"
  - key: BACKUP_S3_BUCKET
    value: ""
  - key: BACKUP_S3_PREFIX
    value: "ccf-db-backups"
  - key: BACKUP_S3_ACCESS_KEY_ID
    value: ""
  - key: BACKUP_S3_SECRET_ACCESS_KEY
    value: ""

databases:
- engine: PG
  name: db
  production: true
  version: "15"
  size: db-s-1vcpu-1gb
